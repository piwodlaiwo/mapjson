<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
  const palette = [
    '#c17b52', '#8fad88', '#d4b483', '#7a9cbf', '#c2956c',
    '#b5c9a1', '#d49a6a', '#6e9ab8', '#c4a06a', '#9bbfaa',
    '#bf8c5a', '#7aadbe', '#d4aa80', '#8ab89e', '#b87a4a', '#a8c0b0'
  ];

  const width = 960, height = 640;
  const svg = d3.select("#map").append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .style("background", "#ede8de");

  d3.json("https://mapjson.mapjson.workers.dev/v1/geo?layer=regions&filter=PL&detail=high&properties=name").then(topo => {
    const regions = topojson.feature(topo, topo.objects.geo);
    const projection = d3.geoMercator().fitSize([width, height], regions);
    const path = d3.geoPath().projection(projection);

    svg.append("g")
      .selectAll("path")
      .data(regions.features)
      .join("path")
      .attr("d", path)
      .attr("fill", (d, i) => palette[i % palette.length])
      .attr("stroke", "#d8cfc0")
      .attr("stroke-width", 1.5);

    svg.append("g")
      .attr("pointer-events", "none")
      .selectAll("text")
      .data(regions.features)
      .join("text")
      .attr("transform", d => `translate(${path.centroid(d)})`)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .style("font-family", "IBM Plex Mono, monospace")
      .style("font-size", "9px")
      .style("font-weight", "400")
      .style("fill", "#1a1a1a")
      .style("stroke", "rgba(237,232,222,0.9)")
      .style("stroke-width", "3px")
      .style("paint-order", "stroke fill")
      .text(d => d.properties.name || "");
  });
</script>
