name = "mapjson"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

[[r2_buckets]]
binding = "GEO_BUCKET"
bucket_name = "mapjson"

# KV not needed — properties.json is served from R2 and cached in memory

# The key-resolution API (resolve/feedback/entities) is the mapjson-ontology
# worker, exposed through this worker so developers see one API host.
[[services]]
binding = "ONTOLOGY"
service = "mapjson-ontology"
